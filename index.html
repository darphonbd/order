<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="font-family:sans-serif; text-align:center; padding:20px;">

<h2>🛍️ Order Details</h2>

<div id="details">Loading...</div>
<br>

<button onclick="update('confirm')">✅ Confirm</button>
<button onclick="update('cancel')">❌ Cancel</button>

<p id="status"></p>

<script>
const params = new URLSearchParams(window.location.search);
const row = params.get("row");
const mobile = params.get("mobile");



const API_URL = "https://script.google.com/macros/s/AKfycby23Lo-WA5TAzN8c36ot-PBKN0bWzREmrDlDALROTSXOMuTBtc2v1fusdlk1iKqngBM/exec";

// 🔹 Load order details
fetch(`${API_URL}?row=${row}&mobile=${mobile}`)
  .then(r => r.text())
  .then(text => {
    const data = JSON.parse(text);

const IMAGE_BASE = "https://raw.githubusercontent.com/darphonbd/order/main/images/";

const formats = ["JPG", "jpeg", "png", "webp"];

function loadImage(product) {
  let index = 0;
  const img = document.createElement("img");
  img.width = 200;
  img.style.borderRadius = "10px";

  function tryNext() {
    if (index >= formats.length) {
      img.src = "https://via.placeholder.com/200?text=No+Image";
      return;
    }

    img.src = IMAGE_BASE + product + "." + formats[index];
    index++;

    img.onerror = tryNext;
  }

  tryNext();
  return img;
}

const imageElement = loadImage(data.product);

document.getElementById("details").innerHTML = `
  <div id="imgBox"></div><br><br>

  নাম: ${data.name}<br>
  প্রোডাক্ট: ${data.product} (${data.size})<br>
  মোট: ${data.total}<br>
  ঠিকানা: ${data.address}<br>
  স্ট্যাটাস: ${data.status}
`;

document.getElementById("imgBox").appendChild(imageElement);
  });

// 🔹 Update status
function update(action) {
  document.getElementById("status").innerText = "Processing...";

  fetch(`${API_URL}?row=${row}&mobile=${mobile}&action=${action}`)
    .then(r => r.text())
    .then(text => {
      const data = JSON.parse(text);

      document.getElementById("status").innerText = data.message;

      // reload updated status
      location.reload();
    })
    .catch(err => {
      document.getElementById("status").innerText = "Error!";
    });
}
</script>

</body>
</html>
